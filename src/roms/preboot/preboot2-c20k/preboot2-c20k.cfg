MEMORY {
    ZP:         start = $0000, size = $0080, type = rw, define = yes;
    RAM:        start = $1000, size = $6000, type = rw, define = yes;
    STACK:      start = $7000, size = $0C00, type = rw, define = yes;
    ROM:        start = $C000, size = $3C00, type = ro, define = yes, file = %O, fill=yes;
    ROM_HOLE:   start = $FC00, size = $0300, type = ro, define = yes, file = %O, fill=yes;
    ROM2:       start = $FF00, size = $00FA, type = ro, define = yes, file = %O, fill=yes;
    ROM_VECS:   start = $FFFA, size = $0006, type = ro, define = yes, file = %O, fill=yes;

}
SEGMENTS {
    ZEROPAGE:   load = ZP,  type = zp;    
    STARTUP:    load = ROM, type = ro;
    ONCE:       load = ROM, type = ro;
    CODE:       load = ROM, type = ro;
    RODATA:     load = ROM, type = ro;
    DATA:       load = ROM, type = rw, run=RAM, define=yes;
    VECS:       load = ROM_VECS, type = ro;
    BSS:        load = RAM, type = bss, define=yes;
}
FEATURES {
    CONDES: type    = constructor,
            label   = __CONSTRUCTOR_TABLE__,
            count   = __CONSTRUCTOR_COUNT__,
            segment = ONCE;
    CONDES: type    = destructor,
            label   = __DESTRUCTOR_TABLE__,
            count   = __DESTRUCTOR_COUNT__,
            segment = RODATA;
    CONDES: type    = interruptor,
            label   = __INTERRUPTOR_TABLE__,
            count   = __INTERRUPTOR_COUNT__,
            segment = RODATA,
            import  = __CALLIRQ__;
}


